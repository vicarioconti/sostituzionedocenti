<script>
// ================================================================
// ⚙️  CONFIGURAZIONE — modifica solo questi valori
// ================================================================
const CFG = {
  // Supabase → Settings → API → Project URL
  SUPABASE_URL: 'https://yuqcidujofmdjmlvwgyr.supabase.co',
  // Supabase → Settings → API → anon/public key
  SUPABASE_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl1cWNpZHVqb2ZtZGptbHZ3Z3lyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4MDE5MTUsImV4cCI6MjA5NDM3NzkxNX0.T1FU9s8hggTIYaRJwf58Vl5JuRLQp8UxwOO4U8cKQzk',
  // EmailJS → Account → General → Public Key
  EMAILJS_PUBLIC_KEY: 'LA_TUA_PUBLIC_KEY',
  // EmailJS → Email Services → Service ID
  EMAILJS_SERVICE_ID: 'service_dct18kt',
  // EmailJS → Email Templates → Template ID
  EMAILJS_TEMPLATE_ID: 'template_7iqfynn',
};

// ================================================================
// INIT LIBRERIE
// ================================================================
const { createClient } = window.supabase;
const sb = createClient(CFG.SUPABASE_URL, CFG.SUPABASE_KEY);
emailjs.init(CFG.EMAILJS_PUBLIC_KEY);

// ================================================================
// COSTANTI
// ================================================================
const CLASSI_BETTI=['1lcs','2lcs','3lcs','4lcs','5lcs','1lds','2lds','3lds','4lds','5lds','1le','2le','3le','4le','5le'];
const GIORNI=['Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
const GIORNO_MAP={'lunedi':0,'lunedì':0,'lun':0,'mon':0,'monday':0,'martedi':1,'martedì':1,'mar':1,'tue':1,'tuesday':1,'mercoledi':2,'mercoledì':2,'mer':2,'wed':2,'wednesday':2,'giovedi':3,'giovedì':3,'gio':3,'thu':3,'thursday':3,'venerdi':4,'venerdì':4,'ven':4,'fri':4,'friday':4,'sabato':5,'sab':5,'sat':5,'saturday':5,'domenica':6,'dom':6,'sun':6,'sunday':6};
const CSV_ESEMPIO=`# CSV Orario — formato: durata,mat_nome,doc_cogn,doc_nome,classe,aula,giorno,o.inizio,sede
# Per più docenti stessa ora: separare con ; (punto e virgola)
# Disposizione = docente disponibile per sostituzioni
60,Matematica,Rossi,Marco,1A,Aula1,Lunedì,08:00,sede
60,Italiano,Bianchi,Laura,1A,Aula1,Lunedì,09:00,sede
60,Inglese,Ferrari,Giulia,2B,Aula2,Lunedì,08:00,sede
120,Matematica,Rossi,Marco,2B,Aula2,Lunedì,09:00,sede
60,Disposizione,Neri,Anna,,,Lunedì,10:00,sede
60,Fisica,Russo,Carlo,1lcs,Aula3,Martedì,08:00,Betti
60,Disposizione,Neri,Anna,,,Martedì,10:00,sede`;

// ================================================================
// STATO
// ================================================================
let STATE={
  currentUser:null, ruolo:null,
  page:'sostituzioni', selDate:todayStr(),
  orario:[], assenze:[], sostituzioni:[], utenti:[], emailLog:[],
  toasts:[], modal:null, loading:false,
  _orarioTab:'visualizza', _orarioFiltro:'', _orarioFiltroOra:''
};

// ================================================================
// UTILS
// ================================================================
function normalizzaGiorno(s){if(!s)return -1;const k=s.trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z]/g,'');return GIORNO_MAP[k]??-1;}
function stessoGiorno(a,b){const ia=normalizzaGiorno(a),ib=normalizzaGiorno(b);if(ia===-1||ib===-1)return false;return ia===ib;}
function getSede(c){if(!c||!c.trim())return'de Vincenti';return CLASSI_BETTI.includes(c.toLowerCase().trim())?'Betti':'de Vincenti';}
function getDayName(ds){if(!ds)return'';const d=new Date(ds+'T12:00:00');const n=d.getDay();const idx=n===0?6:n-1;return GIORNI[idx]??'';}
function formatDate(ds){if(!ds)return'';return new Date(ds+'T12:00:00').toLocaleDateString('it-IT',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});}
function todayStr(){return new Date().toISOString().split('T')[0];}
function isDisposizioneMateria(n){return n?n.toLowerCase().replace(/\s+/g,'').includes('disposizione'):false;}

function parseCSV(text){
  const rows=[];
  for(const line of text.trim().split('\n')){
    if(!line.trim()||line.trim().startsWith('#'))continue;
    const parts=[];let buf='',inQ=false;
    for(const c of line){if(c==='"'){inQ=!inQ;}else if(c===','&&!inQ){parts.push(buf.trim());buf='';}else buf+=c;}
    parts.push(buf.trim());
    if(parts.length<9)continue;
    const [durata,mat_nome,...rest]=parts;
    const docCogns=rest[0].split(';').map(s=>s.trim()).filter(Boolean);
    const docNomi=rest[1].split(';').map(s=>s.trim()).filter(Boolean);
    const classe=rest[2]||'',aula=rest[3]||'',giorno=rest[4]||'',oInizio=rest[5]||'';
    const gi=normalizzaGiorno(giorno);
    const giornoCanon=gi>=0&&gi<6?GIORNI[gi]:giorno.trim();
    rows.push({durata:parseInt(durata)||60,mat_nome:mat_nome.trim(),doc_cogn:docCogns.length>0?docCogns:[rest[0]],doc_nome:docNomi,classe:classe.trim(),aula:aula.trim(),giorno:giornoCanon,oInizio:oInizio.trim(),sede:getSede(classe)});
  }
  return rows;
}

// ================================================================
// SUPABASE — LETTURA
// ================================================================
async function caricaTutto(){
  const [ro,as,so,ut,em]=await Promise.all([
    sb.from('orario').select('*').order('giorno').order('o_inizio'),
    sb.from('assenze').select('*').order('data'),
    sb.from('sostituzioni').select('*'),
    sb.from('utenti').select('*').order('cognome'),
    sb.from('email_log').select('*').order('inviata_il',{ascending:false}).limit(100),
  ]);
  if(ro.data)STATE.orario=ro.data.map(r=>({...r,doc_cogn:Array.isArray(r.doc_cogn)?r.doc_cogn:JSON.parse(r.doc_cogn||'[]'),doc_nome:Array.isArray(r.doc_nome)?r.doc_nome:JSON.parse(r.doc_nome||'[]')}));
  if(as.data)STATE.assenze=as.data.map(a=>({...a,date:a.data,docCogn:a.doc_cogn,docNome:a.doc_nome,ora:a.ora||'',tipo:a.tipo}));
  if(so.data)STATE.sostituzioni=so.data.map(s=>({...s,assenzaId:s.assenza_id,lessonKey:s.lesson_key,docCognSostituto:s.sostituto_cogn,isDisposizione:s.is_disposizione}));
  if(ut.data)STATE.utenti=ut.data;
  if(em.data)STATE.emailLog=em.data.map(e=>e.oggetto+' → '+e.destinatario+' ['+new Date(e.inviata_il).toLocaleString('it-IT')+'] '+e.stato);
  render();
}

// ================================================================
// SUPABASE — SCRITTURA
// ================================================================
async function dbInserisciAssenza(a){
  const {data,error}=await sb.from('assenze').insert({doc_cogn:a.docCogn,doc_nome:a.docNome,tipo:a.tipo,ora:a.ora||null,data:a.date,inserito_da:STATE.currentUser.id}).select().single();
  if(error){addToast('❌ Errore DB: '+error.message,true);return null;}
  return data;
}
async function dbEliminaAssenza(id){const {error}=await sb.from('assenze').delete().eq('id',id);if(error)addToast('❌ Errore: '+error.message,true);return !error;}
async function dbSalvaSostituzione(assenzaId,lessonKey,docCognSostituto,isDisposizione,docCognAssente){
  const {error}=await sb.from('sostituzioni').upsert({assenza_id:assenzaId,lesson_key:lessonKey,sostituto_cogn:docCognSostituto,is_disposizione:isDisposizione,assegnata_da:STATE.currentUser.id},{onConflict:'assenza_id,lesson_key'});
  if(error){addToast('❌ Errore: '+error.message,true);return false;}
  return true;
}
async function dbRimuoviSostituzione(assenzaId,lessonKey){const {error}=await sb.from('sostituzioni').delete().eq('assenza_id',assenzaId).eq('lesson_key',lessonKey);return !error;}
async function dbSalvaOrario(rows){
  await sb.from('orario').delete().neq('id',0);
  const payload=rows.map(r=>({durata:r.durata,mat_nome:r.mat_nome,doc_cogn:JSON.stringify(r.doc_cogn),doc_nome:JSON.stringify(r.doc_nome),classe:r.classe,aula:r.aula,giorno:r.giorno,o_inizio:r.oInizio,sede:r.sede}));
  const {error}=await sb.from('orario').insert(payload);
  if(error){addToast('❌ Errore salvataggio orario: '+error.message,true);return false;}
  return true;
}
async function dbEliminaOrario(){const {error}=await sb.from('orario').delete().neq('id',0);return !error;}
async function dbCreaUtente(u){
  // 1. Crea l'utente in Supabase Auth (funziona con anon key)
  const {data, error} = await sb.auth.signUp({
    email: u.email,
    password: u.password,
    options: {
      data: {
        username: u.username,
        nome: u.nome,
        cognome: u.cognome,
        ruolo: u.ruolo
      }
    }
  });

  if(error){
    addToast('❌ Errore Auth: ' + error.message, true);
    return false;
  }

  const userId = data.user?.id;
  if(!userId){
    addToast('❌ ID utente non ricevuto da Auth', true);
    return false;
  }

  // 2. Inserisci il profilo nella tabella utenti con l'id di Auth
  const {error: e2} = await sb.from('utenti').insert({
    id: userId,
    username: u.username,
    nome: u.nome,

function lezioniPerAssenza(assenza){
  const giorno=getDayName(assenza.date);
  return STATE.orario.filter(r=>{
    if(!r.doc_cogn.includes(assenza.docCogn))return false;
    if(assenza.tipo==='giorno')return stessoGiorno(r.giorno,giorno);
    if(assenza.tipo==='ora')return stessoGiorno(r.giorno,giorno)&&r.oInizio===assenza.ora;
    return false;
  });
}

function docentiDisponibili(lezione,selDate){
  const giorno=getDayName(selDate);
  const docInDisposizione=new Set(STATE.orario.filter(r=>stessoGiorno(r.giorno,giorno)&&isDisposizioneMateria(r.mat_nome)&&r.oInizio===lezione.oInizio).flatMap(r=>r.doc_cogn));
  const orarioBusy=STATE.orario.filter(r=>stessoGiorno(r.giorno,giorno)&&r.oInizio===lezione.oInizio&&!isDisposizioneMateria(r.mat_nome));
  const docentiOccupati=new Set(orarioBusy.flatMap(r=>r.doc_cogn));
  STATE.assenze.filter(a=>{if(a.date!==selDate)return false;if(a.tipo==='giorno')return true;return a.tipo==='ora'&&a.ora===lezione.oInizio;}).forEach(a=>docentiOccupati.add(a.docCogn));
  lezione.doc_cogn.forEach(d=>docentiOccupati.add(d));
  docentiOccupati.forEach(d=>docInDisposizione.delete(d));
  const disposizioni=[...docInDisposizione];
  const tutti=new Set([...docentiOccupati,...docInDisposizione]);
  const filter=arr=>[...new Set(arr)].filter(c=>!tutti.has(c));
  const stesseClassi=filter(STATE.orario.filter(r=>stessoGiorno(r.giorno,giorno)&&r.classe===lezione.classe&&!isDisposizioneMateria(r.mat_nome)&&!r.doc_cogn.every(d=>lezione.doc_cogn.includes(d))).flatMap(r=>r.doc_cogn));
  const stessaMat=filter(STATE.orario.filter(r=>stessoGiorno(r.giorno,giorno)&&r.mat_nome===lezione.mat_nome&&r.oInizio!==lezione.oInizio&&!isDisposizioneMateria(r.mat_nome)).flatMap(r=>r.doc_cogn));
  const tuttiDocenti=[...new Set(STATE.orario.filter(r=>!isDisposizioneMateria(r.mat_nome)).flatMap(r=>r.doc_cogn))];
  const liberi=filter(tuttiDocenti);
  return{disposizioni,stesseClassi,stessaMat,liberi};
}

function addToast(msg,isErr){
  const id=Date.now()+Math.random();
  STATE.toasts=[...STATE.toasts,{id,msg,isErr}];
  const wrap=document.querySelector('.toast-wrap');
  if(wrap){const t=document.createElement('div');t.className='toast'+(isErr?' err':'');t.textContent=msg;wrap.appendChild(t);setTimeout(()=>t.remove(),4000);}
  setTimeout(()=>{STATE.toasts=STATE.toasts.filter(t=>t.id!==id);},4000);
}

// ================================================================
// RENDER ENGINE
// ================================================================
function el(tag,attrs,children){
  const e=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==='class')e.className=v;
    else if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='html')e.innerHTML=v;
    else e.setAttribute(k,v);
  });
  if(children)flatten(children).forEach(c=>{if(c==null||c===false)return;e.appendChild(typeof c==='string'?document.createTextNode(c):c);});
  return e;
}
function flatten(a){return Array.isArray(a)?a.flatMap(flatten):[a];}
function frag(...children){const f=document.createDocumentFragment();flatten(children).forEach(c=>{if(c!=null&&c!==false)f.appendChild(typeof c==='string'?document.createTextNode(c):c);});return f;}

function render(){
  const root=document.getElementById('app');
  root.innerHTML='';
  if(STATE.loading){root.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:1rem;background:linear-gradient(135deg,#1a3a6e,#1a56a0)"><div style="width:40px;height:40px;border:3px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite"></div><div style="color:#fff;font-size:0.9rem">Caricamento...</div></div>';return;}
  root.appendChild(STATE.currentUser?renderApp():renderLogin());
}

function renderSelectSostituto(assenza,lezione,idx,key,sost){
  const disp=docentiDisponibili(lezione,STATE.selDate);
  const valCorrente=sost?sost.docCognSostituto:'';
  const wrap=el('div',{class:'dd-wrap'});
  function isDispVal(v){return v&&disp.disposizioni.includes(v);}
  function labelFor(v){if(!v)return'— Nessuno assegnato —';return isDispVal(v)?'⭐ '+v+' (a disposizione)':v;}
  const triggerLabel=el('span',{class:'dd-label'},labelFor(valCorrente));
  const trigger=el('button',{class:'dd-trigger'+(isDispVal(valCorrente)?' disp-sel':''),type:'button'},[triggerLabel,el('span',{class:'dd-arrow'},'▾')]);
  const menu=el('div',{class:'dd-menu'});
  const badge=el('div',{class:'dd-badge',style:{display:isDispVal(valCorrente)?'flex':'none'}},'⭐ A disposizione');
  trigger.addEventListener('click',function(e){e.stopPropagation();document.querySelectorAll('.dd-menu.open').forEach(m=>{if(m!==menu)m.classList.remove('open');});menu.classList.toggle('open');});
  function buildMenu(curVal){
    menu.innerHTML='';
    const noneOpt=el('div',{class:'dd-none'+(curVal===''?' selected':'')},'— Nessuno assegnato —');
    noneOpt.addEventListener('click',function(e){e.stopPropagation();applyVal('');});
    menu.appendChild(noneOpt);
    [{label:'⭐ A disposizione — priorità massima',docs:disp.disposizioni,isDisp:true},{label:'🟢 Stesso docente in classe',docs:disp.stesseClassi,isDisp:false},{label:'🟡 Stessa materia',docs:disp.stessaMat,isDisp:false},{label:'⚪ Altri disponibili',docs:disp.liberi,isDisp:false}].forEach(function(g){
      if(!g.docs||g.docs.length===0)return;
      menu.appendChild(el('div',{class:'dd-group-label'+(g.isDisp?' disp-lbl':'')},g.label));
      g.docs.forEach(function(d){
        const isSel=d===curVal;
        const item=el('div',{class:'dd-option'+(g.isDisp?' disp-opt':'')+(isSel?' selected':'')});
        if(g.isDisp)item.appendChild(document.createTextNode('⭐ '));
        item.appendChild(el('span',{},d));
        if(isSel)item.appendChild(el('span',{style:{marginLeft:'auto',fontSize:'0.72rem'}},'✓'));
        item.addEventListener('click',function(e){e.stopPropagation();applyVal(d);});
        menu.appendChild(item);
      });
    });
  }
  async function applyVal(val){
    menu.classList.remove('open');
    const isD=isDispVal(val);
    triggerLabel.textContent=labelFor(val);
    trigger.className='dd-trigger'+(isD?' disp-sel':'');
    badge.style.display=isD?'flex':'none';
    buildMenu(val);
    if(val){
      const ok=await dbSalvaSostituzione(assenza.id,key,val,isD,assenza.docCogn);
      if(ok){
        const sostIdx=STATE.sostituzioni.findIndex(s=>s.assenzaId===assenza.id&&s.lessonKey===key);
        const nuovaSost={assenzaId:assenza.id,lessonKey:key,docCognSostituto:val,isDisposizione:isD};
        if(sostIdx>=0)STATE.sostituzioni[sostIdx]=nuovaSost;else STATE.sostituzioni.push(nuovaSost);
        await inviaEmailSostituzione(assenza,lezione,val);
        addToast((isD?'⭐ A disposizione assegnato':'✅ Sostituzione assegnata')+' — Prof. '+val);
      }
    } else {
      await dbRimuoviSostituzione(assenza.id,key);
      STATE.sostituzioni=STATE.sostituzioni.filter(s=>!(s.assenzaId===assenza.id&&s.lessonKey===key));
      addToast('ℹ️ Sostituzione rimossa');
    }
  }
  buildMenu(valCorrente);
  wrap.appendChild(trigger);wrap.appendChild(menu);wrap.appendChild(badge);
  return wrap;
}

function apriModaleUtente(utente){
  const isEdit=!!utente;
  const errDiv=el('div',{class:'err-msg hidden'});
  const inpNome=el('input',{type:'text',value:utente?utente.nome:'',placeholder:'es. Marco'});
  const inpCogn=el('input',{type:'text',value:utente?utente.cognome:'',placeholder:'es. Rossi'});
  const inpUser=el('input',{type:'text',value:utente?utente.username:'',placeholder:'es. rossi'});
  if(isEdit)inpUser.disabled=true;
  const inpPass=el('input',{type:'password',placeholder:isEdit?'(lascia vuoto per non cambiare)':'password'});
  const inpEmail=el('input',{type:'email',value:utente?utente.email:'',placeholder:'nome@scuola.edu'});
  const selRuolo=el('select',{});
  [['docente','Docente'],['admin','Amministratore']].forEach(([v,l])=>{const o=el('option',{value:v},l);if(utente&&utente.ruolo===v)o.selected=true;selRuolo.appendChild(o);});
  async function submit(){
    const nome=inpNome.value.trim(),cogn=inpCogn.value.trim(),user=isEdit?utente.username:inpUser.value.trim();
    const pass=inpPass.value,email=inpEmail.value.trim(),ruolo=selRuolo.value;
    if(!nome||!cogn||!user||!email||(!isEdit&&!pass)){errDiv.textContent='Compila tutti i campi';errDiv.className='err-msg';return;}
    if(isEdit){
      const updates={nome,cognome:cogn,email,ruolo};
      const ok=await dbModificaUtente(utente.id,updates);
      if(ok){addToast('✅ Utente modificato');STATE.modal=null;await caricaTutto();}
    } else {
      const ok=await dbCreaUtente({username:user,password:pass,nome,cognome:cogn,email,ruolo});
      if(ok){addToast('✅ Utente creato');STATE.modal=null;await caricaTutto();}
    }
  }
  STATE.modal={title:(isEdit?'✏️ Modifica utente':'➕ Nuovo utente'),body:el('div',{},[errDiv,el('div',{class:'grid2'},[el('div',{class:'form-group'},[el('label',{},'Nome'),inpNome]),el('div',{class:'form-group'},[el('label',{},'Cognome'),inpCogn])]),el('div',{class:'form-group'},[el('label',{},'Username'),inpUser]),!isEdit?el('div',{class:'form-group'},[el('label',{},'Password iniziale'),inpPass]):null,el('div',{class:'form-group'},[el('label',{},'Email'),inpEmail]),el('div',{class:'form-group'},[el('label',{},'Ruolo'),selRuolo])]),actions:[{label:'Annulla',cls:'btn btn-outline',cb:()=>{STATE.modal=null;render();}},{label:isEdit?'Salva':'Crea utente',cls:'btn btn-primary',cb:submit}]};
  render();
}
