<script>
// ================================================================
// ⚙️  CONFIGURAZIONE
// ================================================================
const CFG = {
  SUPABASE_URL: 'https://yuqcidujofmdjmlvwgyr.supabase.co',
  SUPABASE_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl1cWNpZHVqb2ZtZGptbHZ3Z3lyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4MDE5MTUsImV4cCI6MjA5NDM3NzkxNX0.T1FU9s8hggTIYaRJwf58Vl5JuRLQp8UxwOO4U8cKQzk',
  EMAILJS_PUBLIC_KEY: 'TfFZD5K_tKQC6CGU4',
  EMAILJS_SERVICE_ID: 'service_y4xpu5w',
  EMAILJS_TEMPLATE_ID: 'template_7iqfynn',
};

const { createClient } = window.supabase;
const sb = createClient(CFG.SUPABASE_URL, CFG.SUPABASE_KEY);
emailjs.init(CFG.EMAILJS_PUBLIC_KEY);

// ================================================================
// COSTANTI
// ================================================================
const CLASSI_BETTI=['1lcs','2lcs','3lcs','4lcs','5lcs','1lds','2lds','3lds','4lds','5lds','1le','2le','3le','4le','5le'];
const GIORNI=['Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
const GIORNO_MAP={'lunedi':0,'lunedì':0,'lun':0,'mon':0,'monday':0,'martedi':1,'martedì':1,'mar':1,'tue':1,'tuesday':1,'mercoledi':2,'mercoledì':2,'mer':2,'wed':2,'wednesday':2,'giovedi':3,'giovedì':3,'gio':3,'thu':3,'thursday':3,'venerdi':4,'venerdì':4,'ven':4,'fri':4,'friday':4,'sabato':5,'sab':5,'sat':5,'saturday':5,'domenica':6,'dom':6,'sun':6,'sunday':6};
const CSV_ESEMPIO=`# CSV Orario — formato: durata,mat_nome,doc_cogn,doc_nome,classe,aula,giorno,o.inizio,sede
# Più docenti stessa ora: separare con ; | Disposizione = docente per sostituzioni
# Formati ora accettati: 08:00  08h00  8h00  8.00  800  1345
60,Matematica,Rossi,Marco,1A,Aula1,Lunedì,08:00,sede
60,Italiano,Bianchi,Laura,1A,Aula1,Lunedì,09h00,sede
60,Inglese,Ferrari,Giulia,2B,Aula2,Lunedì,08:00,sede
120,Matematica,Rossi,Marco,2B,Aula2,Lunedì,09:00,sede
60,Disposizione,Neri,Anna,,,Lunedì,10:00,sede
60,Fisica,Russo,Carlo,1lcs,Aula3,Martedì,08h00,Betti
60,Disposizione,Neri,Anna,,,Martedì,10:00,sede`;

// ================================================================
// STATO
// ================================================================
let STATE={
  currentUser:null,ruolo:null,logoUrl:null,
  page:'sostituzioni',selDate:todayStr(),
  orario:[],assenze:[],sostituzioni:[],utenti:[],emailLog:[],
  emailErrorLog:[],
  toasts:[],modal:null,loading:false,
  _orarioTab:'visualizza',_orarioFiltro:'',_orarioFiltroOra:'',
  _emailTab:'log',
  _primoAccesso:false
};

// Logo caricato da GitHub
STATE.logoUrl='https://raw.githubusercontent.com/vicarioconti/sostituzionedocenti/main/logo.png';

// ================================================================
// UTILS
// ================================================================
function normalizzaGiorno(s){if(!s)return -1;const k=s.trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z]/g,'');return GIORNO_MAP[k]??-1;}
function stessoGiorno(a,b){const ia=normalizzaGiorno(a),ib=normalizzaGiorno(b);if(ia===-1||ib===-1)return false;return ia===ib;}
function getSede(c){if(!c||!c.trim())return'de Vincenti';return CLASSI_BETTI.includes(c.toLowerCase().trim())?'Betti':'de Vincenti';}
function getDayName(ds){if(!ds)return'';const d=new Date(ds+'T12:00:00');const n=d.getDay();const idx=n===0?6:n-1;return GIORNI[idx]??'';}
function formatDate(ds){if(!ds)return'';return new Date(ds+'T12:00:00').toLocaleDateString('it-IT',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});}
function todayStr(){return new Date().toISOString().split('T')[0];}
function isDisposizioneMateria(n){return n?n.toLowerCase().replace(/\s+/g,'').includes('disposizione'):false;}

function normalizzaOra(s){
  if(!s)return'';
  const t=s.trim();
  if(/^\d{1,2}:\d{2}$/.test(t)){const[h,m]=t.split(':');return h.padStart(2,'0')+':'+m;}
  const mH=t.match(/^(\d{1,2})[hH](\d{2})$/);if(mH)return mH[1].padStart(2,'0')+':'+mH[2];
  const mP=t.match(/^(\d{1,2})\.(\d{2})$/);if(mP)return mP[1].padStart(2,'0')+':'+mP[2];
  const mC=t.match(/^(\d{1,2}),(\d{2})$/);if(mC)return mC[1].padStart(2,'0')+':'+mC[2];
  const mN=t.match(/^(\d{3,4})$/);if(mN){const p=mN[1].padStart(4,'0');return p.slice(0,2)+':'+p.slice(2);}
  return t;
}

function parseCSV(text){
  const rows=[];
  for(const line of text.trim().split('\n')){
    if(!line.trim()||line.trim().startsWith('#'))continue;
    const parts=[];let buf='',inQ=false;
    for(const c of line){if(c==='"'){inQ=!inQ;}else if(c===','&&!inQ){parts.push(buf.trim());buf='';}else buf+=c;}
    parts.push(buf.trim());
    if(parts.length<9)continue;
    const [durata,mat_nome,...rest]=parts;
    const docCogns=rest[0].split(';').map(s=>s.trim()).filter(Boolean);
    const docNomi=rest[1].split(';').map(s=>s.trim()).filter(Boolean);
    const classe=rest[2]||'',aula=rest[3]||'',giorno=rest[4]||'',oInizioRaw=rest[5]||'';
    const gi=normalizzaGiorno(giorno);
    const giornoCanon=gi>=0&&gi<6?GIORNI[gi]:giorno.trim();
    const oInizio=normalizzaOra(oInizioRaw);
    rows.push({durata:parseInt(durata)||60,mat_nome:mat_nome.trim(),doc_cogn:docCogns.length>0?docCogns:[rest[0]],doc_nome:docNomi,classe:classe.trim(),aula:aula.trim(),giorno:giornoCanon,oInizio,sede:getSede(classe)});
  }
  return rows;
}

// ================================================================
// SUPABASE — LETTURA
// ================================================================
async function caricaTutto(){
  const [ro,as,so,ut,em]=await Promise.all([
    sb.from('orario').select('*').order('giorno').order('o_inizio'),
    sb.from('assenze').select('*').order('data'),
    sb.from('sostituzioni').select('*'),
    sb.from('utenti').select('*').order('cognome'),
    sb.from('email_log').select('*').order('inviata_il',{ascending:false}).limit(100),
  ]);
  if(ro.data)STATE.orario=ro.data.map(r=>{
    // Canonicalizza il giorno: qualunque variante arrivi dal DB (con/senza accento, case mista)
    // viene ricondotta al valore canonico di GIORNI[], così stessoGiorno() funziona sempre.
    const gi=normalizzaGiorno(r.giorno);
    const giornoCanon=(gi>=0&&gi<=6)?GIORNI[gi]:(r.giorno||'');
    return {...r,doc_cogn:Array.isArray(r.doc_cogn)?r.doc_cogn:JSON.parse(r.doc_cogn||'[]'),doc_nome:Array.isArray(r.doc_nome)?r.doc_nome:JSON.parse(r.doc_nome||'[]'),oInizio:r.o_inizio,giorno:giornoCanon};
  });

  const payload={id:userId,username:u.username,nome:u.nome,cognome:u.cognome,email:u.email,ruolo:u.ruolo};

    if(pw===DEFAULT_PASSWORD){errDiv.textContent='Scegli una password diversa da quella predefinita';errDiv.className='err-msg';return;}

function lezioniPerAssenza(assenza){
  const giorno=getDayName(assenza.date);
  if(assenza.tipo==='uscita') return []; // nessuna lezione da coprire per l'uscita stessa
  return STATE.orario.filter(r=>{
    if(!r.doc_cogn.includes(assenza.docCogn))return false;
    if(assenza.tipo==='giorno')return stessoGiorno(r.giorno,giorno);
    if(assenza.tipo==='ora')return stessoGiorno(r.giorno,giorno)&&r.oInizio===assenza.ora;
    return false;
  });
}
// ── Docente co-presente che copre automaticamente ──
// Restituisce i cognomi dei colleghi presenti in aula per quella lezione
// (tutti i doc_cogn della lezione tranne quello assente).
function coDocentiPresenti(lezione, selDate){
  // Trova tutte le assenze del giorno per quella ora
  const assenzeDelGiorno=STATE.assenze.filter(a=>{
    if(a.date!==selDate)return false;
    if(a.tipo==='giorno')return true;
    if(a.tipo==='ora')return a.ora===lezione.oInizio;
    return false;
  });
  const docentiAssenti=new Set(assenzeDelGiorno.map(a=>a.docCogn));
  // I co-docenti presenti sono quelli nella lezione che non sono assenti
  return lezione.doc_cogn.filter(d=>!docentiAssenti.has(d));
}
// Restituisce true se la lezione ha almeno un collega presente (auto-coperta)
function isAutoCoperta(lezione, selDate){
  if(lezione.doc_cogn.length<2)return false;
  return coDocentiPresenti(lezione,selDate).length>0;
}

function docentiDisponibili(lezione,selDate){
  const giorno=getDayName(selDate);

  // ── Docenti bloccati per conflitto inter-sede ──
  // Un docente è bloccato se, nella giornata, ha lezioni in entrambe le sedi
  // e l'ora da coprire cade "intrappolata" tra due lezioni di sedi opposte
  // in modo che uno spostamento fisico sia impossibile.
  // Il controllo vale in entrambe le direzioni (Betti→deVincenti e viceversa).
  const sedeDaCoprire=lezione.sede;
  const altraSede=sedeDaCoprire==='Betti'?'de Vincenti':'Betti';

  function isBloccatoDaInteSede(docCogn){
    const lezioniDoc=STATE.orario.filter(r=>
      stessoGiorno(r.giorno,giorno)&&
      r.doc_cogn.includes(docCogn)&&
      !isDisposizioneMateria(r.mat_nome)
    );
    const sediPresenti=new Set(lezioniDoc.map(r=>r.sede));
    if(sediPresenti.size<2) return false; // solo una sede → nessun problema

    const oraTarget=lezione.oInizio;

    // Direzione 1: lezioni dell'ALTRA sede prima e dopo → bloccato a meno che
    //              abbia già lezioni nella sede da coprire nel mezzo
    const oreAltra=lezioniDoc.filter(r=>r.sede===altraSede).map(r=>r.oInizio);
    const oreSede =lezioniDoc.filter(r=>r.sede===sedeDaCoprire).map(r=>r.oInizio);

    const altraPrima=oreAltra.filter(o=>o<oraTarget).sort();
    const altraDopo =oreAltra.filter(o=>o>oraTarget).sort();
    if(altraPrima.length>0&&altraDopo.length>0){
      const ultPrima=altraPrima.at(-1);
      const priDopo =altraDopo[0];
      const haSedeMezzo=oreSede.some(o=>o>ultPrima&&o<priDopo);
      if(!haSedeMezzo) return true;
    }

    // Direzione 2 (speculare): lezioni della SEDE DA COPRIRE prima e dopo
    //   con lezioni dell'altra sede nel mezzo → il docente è già fisicamente
    //   nell'altra sede in quell'intervallo
    const sedePrima=oreSede.filter(o=>o<oraTarget).sort();
    const sedeDopo =oreSede.filter(o=>o>oraTarget).sort();
    if(sedePrima.length>0&&sedeDopo.length>0){
      const ultPrima=sedePrima.at(-1);
      const priDopo =sedeDopo[0];
      const haAltraMezzo=oreAltra.some(o=>o>ultPrima&&o<priDopo);
      if(haAltraMezzo) return true;
    }

    return false;
  }

  const docInDisposizione=new Set(STATE.orario.filter(r=>stessoGiorno(r.giorno,giorno)&&isDisposizioneMateria(r.mat_nome)&&r.oInizio===lezione.oInizio).flatMap(r=>r.doc_cogn));

  // ── Docenti liberati da uscite didattiche ──
  // Se la loro classe è in uscita (tutto il giorno o per questa ora specifica),
  // i docenti che avrebbero quella classe in questa ora diventano a disposizione.
  STATE.assenze.filter(a=>{
    if(a.date!==selDate||a.tipo!=='uscita')return false;
    if(!a.classeUscita)return false;
    if(a.oreUscita&&a.oreUscita.length>0) return a.oreUscita.includes(lezione.oInizio);
    return true; // tutto il giorno
  }).forEach(uscita=>{
    const docLiberati=STATE.orario.filter(r=>
      stessoGiorno(r.giorno,giorno)&&
      r.oInizio===lezione.oInizio&&
      r.classe&&r.classe.toLowerCase().trim()===uscita.classeUscita.toLowerCase().trim()&&
      !isDisposizioneMateria(r.mat_nome)
    ).flatMap(r=>r.doc_cogn);
    docLiberati.forEach(d=>docInDisposizione.add(d));
  });

  const orarioBusy=STATE.orario.filter(r=>stessoGiorno(r.giorno,giorno)&&r.oInizio===lezione.oInizio&&!isDisposizioneMateria(r.mat_nome));
  const docentiOccupati=new Set(orarioBusy.flatMap(r=>r.doc_cogn));
  // Docenti co-presenti in lezioni con colleghi assenti: sono già in aula → occupati
  STATE.orario.filter(r=>stessoGiorno(r.giorno,giorno)&&r.oInizio===lezione.oInizio&&r.doc_cogn.length>1).forEach(r=>{
    const presenti=coDocentiPresenti(r,selDate);
    presenti.forEach(d=>docentiOccupati.add(d));
  });
  STATE.assenze.filter(a=>{if(a.date!==selDate)return false;if(a.tipo==='giorno')return true;return a.tipo==='ora'&&a.ora===lezione.oInizio;}).forEach(a=>docentiOccupati.add(a.docCogn));
  lezione.doc_cogn.forEach(d=>docentiOccupati.add(d));
  docentiOccupati.forEach(d=>docInDisposizione.delete(d));

  // Rimuovi dai disponibili chi è bloccato inter-sede
  [...docInDisposizione].forEach(d=>{if(isBloccatoDaInteSede(d))docInDisposizione.delete(d);});

  const disposizioni=[...docInDisposizione];
  const tutti=new Set([...docentiOccupati,...docInDisposizione]);
  const filter=arr=>[...new Set(arr)].filter(c=>!tutti.has(c)&&!isBloccatoDaInteSede(c));
  const stesseClassi=filter(STATE.orario.filter(r=>stessoGiorno(r.giorno,giorno)&&r.classe===lezione.classe&&!isDisposizioneMateria(r.mat_nome)&&!r.doc_cogn.every(d=>lezione.doc_cogn.includes(d))).flatMap(r=>r.doc_cogn));
  const stessaMat=filter(STATE.orario.filter(r=>stessoGiorno(r.giorno,giorno)&&r.mat_nome===lezione.mat_nome&&r.oInizio!==lezione.oInizio&&!isDisposizioneMateria(r.mat_nome)).flatMap(r=>r.doc_cogn));
  const tuttiDocenti=[...new Set(STATE.orario.filter(r=>!isDisposizioneMateria(r.mat_nome)).flatMap(r=>r.doc_cogn))];
  const liberi=filter(tuttiDocenti);
  return{disposizioni,stesseClassi,stessaMat,liberi};
}

// ================================================================

function addToast(msg,isErr){
  const wrap=document.querySelector('.toast-wrap');
  if(!wrap)return;
  const t=document.createElement('div');
  t.className='toast'+(isErr?' err':'');
  t.textContent=msg;
  wrap.appendChild(t);
  setTimeout(()=>t.remove(),4000);
}

// ================================================================
// RENDER ENGINE
// ================================================================
function el(tag,attrs,children){
  const e=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==='class')e.className=v;
    else if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='html')e.innerHTML=v;
    else e.setAttribute(k,v);
  });
  if(children)flatten(children).forEach(c=>{if(c==null||c===false)return;e.appendChild(typeof c==='string'?document.createTextNode(c):c);});
  return e;
}
function flatten(a){return Array.isArray(a)?a.flatMap(flatten):[a];}
function frag(...children){const f=document.createDocumentFragment();flatten(children).forEach(c=>{if(c!=null&&c!==false)f.appendChild(typeof c==='string'?document.createTextNode(c):c);});return f;}

function render(){
  const root=document.getElementById('app');root.innerHTML='';
  if(STATE.loading){root.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:1rem;background:linear-gradient(135deg,#1a3a6e,#1a56a0)"><div style="width:40px;height:40px;border:3px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite"></div><div style="color:#fff;font-size:0.9rem">Caricamento...</div></div>';return;}
  root.appendChild(STATE.currentUser?renderApp():renderLogin());
}

// Genera array di date YYYY-MM-DD tra due date (incluse), saltando la domenica
function dateRange(from,to){
  const dates=[];
  const cur=new Date(from+'T12:00:00');
  const end=new Date(to+'T12:00:00');
  while(cur<=end){
    if(cur.getDay()!==0) dates.push(cur.toISOString().split('T')[0]);
    cur.setDate(cur.getDate()+1);
  }
  return dates;
}

function apriFinestraAssenza(){
  const docentiOrario=[...new Set(STATE.orario.flatMap(r=>r.doc_cogn))].sort();
  const docentiUtenti=STATE.utenti.filter(u=>u.ruolo==='docente').map(u=>u.cognome);
  const tuttiDocenti=[...new Set([...docentiOrario,...docentiUtenti])].sort();

  // stato interno
  let tipo='giorno', modalitaData='singolo'; // 'singolo' | 'periodo'
  let selectedDoc='', selectedOra='';
  let selectedDate=STATE.selDate, selectedDateDa=STATE.selDate, selectedDateA=STATE.selDate;

  const errDiv=el('div',{class:'err-msg hidden'});

  // ── Docente ──
  const selDocente=el('select',{});
  selDocente.appendChild(el('option',{value:''},'— Seleziona docente —'));
  tuttiDocenti.forEach(d=>selDocente.appendChild(el('option',{value:d},d)));
  selDocente.addEventListener('change',e=>selectedDoc=e.target.value);

  // ── Tipo assenza ──
  const selTipo=el('select',{});
  [['giorno','Tutto il giorno'],['ora','Permesso orario']].forEach(([v,l])=>selTipo.appendChild(el('option',{value:v},l)));

  // ── Ora ──
  const wrapOra=el('div',{class:'form-group',style:{display:'none'}});
  const selOra=el('select',{});
  selOra.addEventListener('change',e=>selectedOra=e.target.value);
  function aggiornareOre(refDate){
    selOra.innerHTML='';
    const giorno=getDayName(refDate||selectedDate);
    const ore=[...new Set(STATE.orario.filter(r=>stessoGiorno(r.giorno,giorno)).map(r=>r.oInizio))].sort();
    (ore.length>0?ore:['08:00','09:00','10:00','11:00','12:00','13:00']).forEach(o=>selOra.appendChild(el('option',{value:o},o)));
    selectedOra=selOra.value;
  }
  wrapOra.appendChild(el('label',{},'Ora interessata'));
  wrapOra.appendChild(selOra);

  // ── Toggle modalità data ──
  const btnSingolo=el('button',{type:'button',class:'btn btn-primary btn-sm'},'📅 Giorno singolo');
  const btnPeriodo=el('button',{type:'button',class:'btn btn-outline btn-sm'},'📆 Periodo (dal… al…)');

  // ── Blocco giorno singolo ──
  const inpData=el('input',{type:'date',value:selectedDate});
  inpData.addEventListener('change',e=>{selectedDate=e.target.value;aggiornareOre(selectedDate);});
  const wrapSingolo=el('div',{class:'form-group'},[el('label',{},'Data'),inpData]);

  // ── Blocco periodo ──
  const inpDa=el('input',{type:'date',value:selectedDateDa});
  const inpA=el('input',{type:'date',value:selectedDateA});
  const previewEl=el('div',{style:{fontSize:'0.78rem',color:'#1a56a0',marginTop:'4px',minHeight:'18px'}});
  function aggiornaPreview(){
    if(!selectedDateDa||!selectedDateA||selectedDateA<selectedDateDa){previewEl.textContent='';return;}
    const n=dateRange(selectedDateDa,selectedDateA).length;
    previewEl.textContent='→ '+n+(n===1?' giorno':' giorni')+' (domeniche escluse)';
  }
  inpDa.addEventListener('change',e=>{
    selectedDateDa=e.target.value;
    if(selectedDateA<selectedDateDa){inpA.value=selectedDateDa;selectedDateA=selectedDateDa;}
    aggiornareOre(selectedDateDa);aggiornaPreview();
  });
  inpA.addEventListener('change',e=>{selectedDateA=e.target.value;aggiornaPreview();});
  const wrapPeriodo=el('div',{style:{display:'none'}},[
    el('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px',marginBottom:'0.25rem'}},[
      el('div',{class:'form-group',style:{margin:0}},[el('label',{},'Dal'),inpDa]),
      el('div',{class:'form-group',style:{margin:0}},[el('label',{},'Al'),inpA]),
    ]),
    previewEl
  ]);

  // ── Logica toggle ──
  function applicaModalita(m){
    modalitaData=m;
    if(m==='singolo'){
      btnSingolo.className='btn btn-primary btn-sm';
      btnPeriodo.className='btn btn-outline btn-sm';
      wrapSingolo.style.display='';
      wrapPeriodo.style.display='none';
    } else {
      btnSingolo.className='btn btn-outline btn-sm';
      btnPeriodo.className='btn btn-primary btn-sm';
      wrapSingolo.style.display='none';
      wrapPeriodo.style.display='';
      aggiornaPreview();
    }
  }
  btnSingolo.addEventListener('click',()=>applicaModalita('singolo'));
  btnPeriodo.addEventListener('click',()=>{
    // Periodo non disponibile per permesso orario
    if(tipo==='ora'){errDiv.textContent='Il permesso orario è disponibile solo per un giorno singolo';errDiv.className='err-msg';return;}
    errDiv.className='err-msg hidden';
    applicaModalita('periodo');
  });

  selTipo.addEventListener('change',e=>{
    tipo=e.target.value;
    wrapOra.style.display=tipo==='ora'?'block':'none';
    if(tipo==='ora'){
      applicaModalita('singolo');
      btnPeriodo.disabled=true;
      btnPeriodo.title='Non disponibile per permesso orario';
    } else {
      btnPeriodo.disabled=false;
      btnPeriodo.title='';
    }
  });

  aggiornareOre(selectedDate);

  // ── Submit ──
  async function submit(){
    errDiv.className='err-msg hidden';
    if(!selectedDoc){errDiv.textContent='Seleziona un docente';errDiv.className='err-msg';return;}
    if(tipo==='ora'&&!selectedOra){errDiv.textContent='Seleziona l\'ora';errDiv.className='err-msg';return;}
    let dates;
    if(modalitaData==='singolo'){
      if(!selectedDate){errDiv.textContent='Seleziona una data';errDiv.className='err-msg';return;}
      dates=[selectedDate];
    } else {
      if(!selectedDateDa||!selectedDateA){errDiv.textContent='Seleziona le date del periodo';errDiv.className='err-msg';return;}
      if(selectedDateA<selectedDateDa){errDiv.textContent='La data di fine deve essere uguale o successiva alla data di inizio';errDiv.className='err-msg';return;}
      dates=dateRange(selectedDateDa,selectedDateA);
      if(dates.length===0){errDiv.textContent='Nessun giorno valido nel periodo selezionato';errDiv.className='err-msg';return;}
    }
    const utente=STATE.utenti.find(u=>u.cognome===selectedDoc);
    let salvate=0;
    for(const d of dates){
      const nuova={docCogn:selectedDoc,docNome:utente?utente.nome:'',tipo,ora:tipo==='ora'?selectedOra:'',date:d};
      const saved=await dbInserisciAssenza(nuova);
      if(saved){nuova.id=saved.id;await inviaEmailAssenza(nuova);salvate++;}
    }
    if(salvate>0){
      STATE.selDate=modalitaData==='singolo'?selectedDate:selectedDateDa;
      STATE.modal=null;
      addToast('✅ '+(salvate===1?'Assenza inserita':salvate+' assenze inserite'));
      await caricaTutto();
    }
  }

  STATE.modal={
    title:'➕ Inserisci Nuova Assenza',
    body:el('div',{},[
      errDiv,
      el('div',{class:'form-group'},[el('label',{},'Docente assente'),selDocente]),
      el('div',{class:'form-group'},[el('label',{},'Tipo assenza'),selTipo]),
      el('div',{style:{display:'flex',gap:'8px',marginBottom:'1rem'}},[btnSingolo,btnPeriodo]),
      wrapSingolo,
      wrapPeriodo,
      wrapOra,
    ]),
    actions:[
      {label:'Annulla',cls:'btn btn-outline',cb:()=>{STATE.modal=null;render();}},
      {label:'Salva assenza',cls:'btn btn-primary',cb:submit}
    ]
  };
  render();
}

function apriFinestraUscita(){
  const classiDisponibili=[...new Set(STATE.orario.map(r=>r.classe).filter(Boolean))].sort();
  const errDiv=el('div',{class:'err-msg hidden'});

  let selectedClasse='';
  let modalitaOre='giorno';   // 'giorno' | 'ore'
  let modalitaData='singolo'; // 'singolo' | 'periodo'
  let oreSelezionate=new Set();
  let accompagnatori='';
  let notaUscita='';
  let selectedDate=STATE.selDate;
  let selectedDateDa=STATE.selDate;
  let selectedDateA=STATE.selDate;

  // ── Classe ──
  const selClasse=el('select',{});
  selClasse.appendChild(el('option',{value:''},'— Seleziona classe —'));
  classiDisponibili.forEach(c=>selClasse.appendChild(el('option',{value:c},c)));
  selClasse.addEventListener('change',e=>{selectedClasse=e.target.value;aggiornaOreClasse();aggiornaInfoDocenti();});

  // ── Modalità durata (ore) ──
  const btnTuttoGiorno=el('button',{type:'button',class:'btn btn-primary btn-sm'},'☀️ Tutto il giorno');
  const btnSoloOre=el('button',{type:'button',class:'btn btn-outline btn-sm'},'⏱ Solo alcune ore');
  const wrapOreClasse=el('div',{style:{display:'none',marginTop:'0.5rem'}});
  const oreCheckboxWrap=el('div',{style:{display:'flex',flexWrap:'wrap',gap:'6px',marginTop:'4px'}});
  wrapOreClasse.appendChild(el('label',{style:{fontSize:'0.8rem',fontWeight:600,color:'#444',marginBottom:'4px',display:'block'}},'Seleziona le ore coinvolte'));
  wrapOreClasse.appendChild(oreCheckboxWrap);

  function aggiornaOreClasse(){
    oreCheckboxWrap.innerHTML='';oreSelezionate.clear();
    if(!selectedClasse||modalitaOre!=='ore')return;
    const refDate=modalitaData==='singolo'?selectedDate:selectedDateDa;
    const g=getDayName(refDate);
    const ore=[...new Set(STATE.orario.filter(r=>stessoGiorno(r.giorno,g)&&r.classe&&r.classe.toLowerCase().trim()===selectedClasse.toLowerCase().trim()).map(r=>r.oInizio))].sort();
    if(ore.length===0){oreCheckboxWrap.appendChild(el('span',{style:{fontSize:'0.78rem',color:'#aaa'}},'Nessuna lezione trovata in orario per questa classe'));return;}
    ore.forEach(ora=>{
      const lbl=el('label',{style:{display:'inline-flex',alignItems:'center',gap:'4px',background:'#f0f4fb',border:'1px solid #d0daf0',borderRadius:'6px',padding:'4px 10px',cursor:'pointer',fontSize:'0.83rem',fontWeight:500}});
      const chk=el('input',{type:'checkbox',value:ora,style:{cursor:'pointer'}});
      chk.addEventListener('change',()=>{if(chk.checked)oreSelezionate.add(ora);else oreSelezionate.delete(ora);});
      lbl.appendChild(chk);lbl.appendChild(document.createTextNode(' '+ora));
      oreCheckboxWrap.appendChild(lbl);
    });
  }

  function applicaModalitaOre(m){
    modalitaOre=m;
    if(m==='giorno'){btnTuttoGiorno.className='btn btn-primary btn-sm';btnSoloOre.className='btn btn-outline btn-sm';wrapOreClasse.style.display='none';}
    else{btnTuttoGiorno.className='btn btn-outline btn-sm';btnSoloOre.className='btn btn-primary btn-sm';wrapOreClasse.style.display='block';aggiornaOreClasse();}
  }
  btnTuttoGiorno.addEventListener('click',()=>applicaModalitaOre('giorno'));
  btnSoloOre.addEventListener('click',()=>applicaModalitaOre('ore'));

  // ── Modalità data (singolo / periodo) ──
  const btnSingolo=el('button',{type:'button',class:'btn btn-primary btn-sm'},'📅 Giorno singolo');
  const btnPeriodo=el('button',{type:'button',class:'btn btn-outline btn-sm'},'📆 Più giorni');

  const wrapSingolo=el('div',{class:'form-group'},[el('label',{},'Data'),el('input',{type:'date',value:selectedDate,onchange:e=>{selectedDate=e.target.value;aggiornaOreClasse();aggiornaInfoDocenti();}})]);
  const inpDa=el('input',{type:'date',value:selectedDateDa});
  const inpA=el('input',{type:'date',value:selectedDateA});
  inpDa.addEventListener('change',e=>{selectedDateDa=e.target.value;aggiornaOreClasse();aggiornaInfoDocenti();});
  inpA.addEventListener('change',e=>{selectedDateA=e.target.value;});
  const wrapPeriodo=el('div',{style:{display:'none'}},[
    el('div',{style:{display:'flex',gap:'12px',flexWrap:'wrap'}},[
      el('div',{class:'form-group',style:{flex:1,minWidth:'130px'}},[el('label',{},'Dal'),inpDa]),
      el('div',{class:'form-group',style:{flex:1,minWidth:'130px'}},[el('label',{},'Al'),inpA])
    ]),
    el('div',{class:'notif notif-info',style:{fontSize:'0.78rem',marginBottom:'0'}},'⚠️ Per uscite su più giorni (es. viaggio di istruzione), le ore "solo alcune ore" si applicano al giorno di partenza/rientro.')
  ]);

  function applicaModalitaData(m){
    modalitaData=m;
    if(m==='singolo'){
      btnSingolo.className='btn btn-primary btn-sm';btnPeriodo.className='btn btn-outline btn-sm';
      wrapSingolo.style.display='block';wrapPeriodo.style.display='none';
    } else {
      btnSingolo.className='btn btn-outline btn-sm';btnPeriodo.className='btn btn-primary btn-sm';
      wrapSingolo.style.display='none';wrapPeriodo.style.display='block';
    }
  }
  btnSingolo.addEventListener('click',()=>applicaModalitaData('singolo'));
  btnPeriodo.addEventListener('click',()=>applicaModalitaData('periodo'));

  // ── Accompagnatori ──
  const inpAccomp=el('input',{type:'text',placeholder:'es. Rossi, Bianchi (oppure lascia vuoto)'});
  inpAccomp.addEventListener('input',e=>accompagnatori=e.target.value);

  // ── Nota / Motivazione ──
  const inpNota=el('input',{type:'text',placeholder:'es. Viaggio di istruzione, Uscita al Museo...'});
  inpNota.addEventListener('input',e=>notaUscita=e.target.value);

  // ── Info docenti liberati ──
  const infoDocenti=el('div',{style:{display:'none',marginTop:'0.5rem',background:'#e0f7f4',border:'1px solid #99e6da',borderRadius:'8px',padding:'0.6rem 0.9rem',fontSize:'0.78rem',color:'#0f766e',lineHeight:1.6}});
  function aggiornaInfoDocenti(){
    if(!selectedClasse){infoDocenti.style.display='none';return;}
    const refDate=modalitaData==='singolo'?selectedDate:selectedDateDa;
    const g=getDayName(refDate);
    const doc=[...new Set(STATE.orario.filter(r=>stessoGiorno(r.giorno,g)&&r.classe&&r.classe.toLowerCase().trim()===selectedClasse.toLowerCase().trim()&&!isDisposizioneMateria(r.mat_nome)).flatMap(r=>r.doc_cogn))];
    if(doc.length===0){infoDocenti.style.display='none';return;}
    infoDocenti.style.display='block';infoDocenti.innerHTML='';
    infoDocenti.appendChild(el('strong',{},'📋 Docenti a disposizione (giorno di partenza): '));
    infoDocenti.appendChild(document.createTextNode(doc.join(', ')));
  }

  // ── Submit ──
  async function submit(){
    errDiv.className='err-msg hidden';
    if(!selectedClasse){errDiv.textContent='Seleziona una classe';errDiv.className='err-msg';return;}
    if(modalitaOre==='ore'&&oreSelezionate.size===0){errDiv.textContent='Seleziona almeno un\'ora';errDiv.className='err-msg';return;}
    let dates;
    if(modalitaData==='singolo'){
      if(!selectedDate){errDiv.textContent='Seleziona la data';errDiv.className='err-msg';return;}
      dates=[selectedDate];
    } else {
      if(!selectedDateDa||!selectedDateA){errDiv.textContent='Seleziona le date del periodo';errDiv.className='err-msg';return;}
      if(selectedDateA<selectedDateDa){errDiv.textContent='La data di fine deve essere uguale o successiva alla data di inizio';errDiv.className='err-msg';return;}
      dates=dateRange(selectedDateDa,selectedDateA);
      if(dates.length===0){errDiv.textContent='Nessun giorno valido nel periodo';errDiv.className='err-msg';return;}
    }
    const oreArr=modalitaOre==='ore'?[...oreSelezionate].sort():[];
    let salvate=0;
    for(const d of dates){
      const nuova={docCogn:'',docNome:'',tipo:'uscita',ora:'',date:d,classeUscita:selectedClasse,oreUscita:oreArr.length>0?oreArr:null,accompagnatori:accompagnatori.trim()||null,notaUscita:notaUscita.trim()||null};
      const saved=await dbInserisciAssenza(nuova);
      if(saved)salvate++;
    }
    if(salvate>0){
      STATE.selDate=modalitaData==='singolo'?selectedDate:selectedDateDa;
      STATE.modal=null;
      addToast('✅ '+(salvate===1?'Uscita registrata':'Uscita registrata per '+salvate+' giorni')+' — Classe '+selectedClasse);
      await caricaTutto();
    }
  }

  STATE.modal={
    title:'🚌 Inserisci Uscita Didattica',
    body:el('div',{},[
      errDiv,
      el('div',{class:'section-note',style:{marginBottom:'1rem'}},'I docenti che avevano lezione con questa classe nelle ore indicate diventeranno automaticamente "a disposizione".'),
      el('div',{class:'form-group'},[el('label',{},'Classe in uscita'),selClasse]),
      el('div',{style:{marginBottom:'0.75rem'}},[
        el('label',{style:{fontSize:'0.8rem',fontWeight:600,color:'#444',display:'block',marginBottom:'6px'}},'Periodo'),
        el('div',{style:{display:'flex',gap:'8px',marginBottom:'8px'}},[btnSingolo,btnPeriodo]),
        wrapSingolo,wrapPeriodo
      ]),
      el('div',{style:{marginBottom:'0.75rem'}},[
        el('label',{style:{fontSize:'0.8rem',fontWeight:600,color:'#444',display:'block',marginBottom:'6px'}},'Orario'),
        el('div',{style:{display:'flex',gap:'8px'}},[btnTuttoGiorno,btnSoloOre]),
        wrapOreClasse
      ]),
      el('div',{class:'form-group'},[el('label',{},'Motivazione (facoltativo)'),inpNota]),
      el('div',{class:'form-group'},[el('label',{},'Accompagnatori (facoltativo)'),inpAccomp]),
      infoDocenti,
    ]),
    actions:[
      {label:'Annulla',cls:'btn btn-outline',cb:()=>{STATE.modal=null;render();}},
      {label:'🚌 Salva uscita',cls:'btn btn-success',cb:submit}
    ]
  };
  render();
}


function renderSostituzioni(){
  const isAdmin=STATE.ruolo==='admin';
  const assenzeGiorno=STATE.assenze.filter(a=>a.date===STATE.selDate);
  const giornoCalc=getDayName(STATE.selDate);
  const giorniNelOrario=[...new Set(STATE.orario.map(r=>r.giorno))];
  const lezioniGiorno=STATE.orario.filter(r=>stessoGiorno(r.giorno,giornoCalc)).length;
  // Conteggio per giorno per diagnostica rapida
  const conteggioPerGiorno=GIORNI.map(g=>{const n=STATE.orario.filter(r=>stessoGiorno(r.giorno,g)).length;return g.substring(0,3)+': '+n;}).join(' | ');
  const debugBar=STATE.orario.length>0?el('div',{class:'notif notif-info',style:{marginBottom:'0.75rem',fontSize:'0.79rem',gap:'6px',flexWrap:'wrap'}},[
    '🗓 Giorno selezionato: ',el('strong',{},giornoCalc),
    ' | Lezioni di oggi: ',el('strong',{},String(lezioniGiorno)),
    el('span',{style:{marginLeft:'8px',fontSize:'0.72rem',color:'#555',fontFamily:'monospace'}},conteggioPerGiorno)
  ]):null;

  // ── VISTA ADMIN: tutto come prima ──
  if(isAdmin){
    const cards=assenzeGiorno.length===0?[el('div',{class:'card'},[el('p',{style:{color:'#999',fontSize:'0.9rem'}},'✅ Nessuna assenza registrata per '+formatDate(STATE.selDate))])]:assenzeGiorno.map(a=>renderCardAssenza(a,true));
    const f=frag(el('div',{class:'page-title'},'🔄 Sostituzioni — '+formatDate(STATE.selDate)));
    f.appendChild(renderDateNav());
    if(debugBar)f.appendChild(debugBar);
    cards.forEach(c=>f.appendChild(c));
    return f;
  }

  // ── VISTA DOCENTE SINGOLO: solo sua assenza e sue sostituzioni ──
  const myCogn=STATE.currentUser.profilo?.cognome||'';

  // La mia eventuale assenza oggi
  const miaAssenza=STATE.assenze.find(a=>a.date===STATE.selDate&&a.docCogn===myCogn);

  // Le sostituzioni assegnate a me oggi
  const mieSostituzioni=STATE.sostituzioni.filter(s=>{
    const a=STATE.assenze.find(x=>x.id===s.assenzaId&&x.date===STATE.selDate);
    return a&&s.docCognSostituto===myCogn;
  });

  const f=frag(el('div',{class:'page-title'},'🔄 La mia giornata — '+formatDate(STATE.selDate)));

  // Blocco assenza personale
  const assenzaCard=el('div',{class:'card'},[
    el('div',{class:'card-title'},'👤 La mia assenza oggi'),
    miaAssenza
      ? assenzaRow(miaAssenza,false)
      : el('p',{style:{color:'#1a7a4a',fontSize:'0.88rem'}},'✅ Nessuna assenza registrata per te oggi')
  ]);
  f.appendChild(assenzaCard);

  // Blocco sostituzioni assegnate
  const righe=mieSostituzioni.map(s=>{
    const a=STATE.assenze.find(x=>x.id===s.assenzaId);
    if(!a)return null;
    const lezioni=lezioniPerAssenza(a);
    const idx=parseInt((s.lessonKey||'').split('_')[1])||0;
    const l=lezioni[idx];
    if(!l)return null;
    return el('div',{class:'assenza-row'},[
      el('div',{style:{width:'36px',height:'36px',borderRadius:'50%',background:'#e8f5ee',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.1rem',flexShrink:0}},'📋'),
      el('div',{class:'assenza-info'},[
        el('div',{class:'assenza-nome'},l.oInizio+' — '+l.mat_nome+(l.classe?' · '+l.classe:'')+(l.aula?' ('+l.aula+')':'')),
        el('div',{class:'assenza-det'},'Sostituisci: Prof. '+a.docCogn+' · ',el('span',{class:'sede-'+(l.sede==='Betti'?'betti':'devincenti')},l.sede))
      ]),
      s.isDisposizione
        ? el('span',{style:{background:'#dcfce7',border:'1px solid #86efac',borderRadius:'6px',padding:'2px 8px',fontSize:'0.72rem',fontWeight:700,color:'#15803d'}},'⭐ A disposizione')
        : el('span',{class:'pill pill-green'},'✓ Assegnata')
    ]);
  }).filter(Boolean);

  const sostCard=el('div',{class:'card'},[
    el('div',{class:'card-title'},'📌 Le mie sostituzioni oggi'),
    righe.length===0
      ? el('p',{style:{color:'#999',fontSize:'0.85rem'}},'Nessuna sostituzione assegnata a te per oggi')
      : frag(...righe)
  ]);
  f.appendChild(sostCard);
  return f;
}

function renderCardAssenza(a,isAdmin){
  // ── USCITA DIDATTICA ──
  if(a.tipo==='uscita'){
    const giorno=getDayName(a.date);
    const oreLabel=a.oreUscita&&a.oreUscita.length>0?('Ore: '+a.oreUscita.join(', ')):'Tutto il giorno';
    // Docenti liberati
    const lezioniClasse=STATE.orario.filter(r=>{
      if(!stessoGiorno(r.giorno,giorno))return false;
      if(!r.classe||r.classe.toLowerCase().trim()!==a.classeUscita.toLowerCase().trim())return false;
      if(isDisposizioneMateria(r.mat_nome))return false;
      if(a.oreUscita&&a.oreUscita.length>0)return a.oreUscita.includes(r.oInizio);
      return true;
    });
    const docLiberati=[...new Set(lezioniClasse.flatMap(r=>r.doc_cogn))];
    const tbody2=el('tbody',{});
    if(lezioniClasse.length===0){tbody2.appendChild(el('tr',{},[el('td',{colspan:'5',style:{color:'#aaa',fontSize:'0.83rem',padding:'0.75rem'}},'Nessuna lezione trovata in orario per questa classe oggi')]));}
    else{
      lezioniClasse.forEach(l=>{
        tbody2.appendChild(el('tr',{},[
          el('td',{},[el('strong',{},l.oInizio)]),
          el('td',{},l.durata+'min'),
          el('td',{},l.mat_nome),
          el('td',{},[...l.doc_cogn.map(d=>el('span',{class:'docente-chip',style:{background:'#dcfce7',borderColor:'#86efac',color:'#15803d'}},d))]),
          el('td',{},[el('span',{class:'sede-'+(l.sede==='Betti'?'betti':'devincenti')},l.sede)])
        ]));
      });
    }
    return el('div',{class:'card',style:{borderLeft:'4px solid #0f766e'}},[
      el('div',{class:'card-title'},[
        '🚌 Classe ',el('strong',{},a.classeUscita),' — Uscita didattica ',
        el('span',{class:'pill pill-teal',style:{marginLeft:'6px'}},oreLabel),
        a.notaUscita?el('span',{style:{marginLeft:'8px',fontSize:'0.82rem',color:'#0f766e',fontStyle:'italic'}},'"'+a.notaUscita+'"'):null,
        a.accompagnatori?el('span',{style:{marginLeft:'8px',fontSize:'0.78rem',color:'#555'}},'Accomp: '+a.accompagnatori):null
      ].filter(Boolean)),
      el('div',{class:'notif notif-info',style:{marginBottom:'0.75rem',fontSize:'0.79rem'}},[
        '📋 Docenti a disposizione per questa classe: ',
        docLiberati.length>0?el('strong',{},docLiberati.join(', ')):el('em',{},'nessuno trovato in orario')
      ]),
      el('div',{class:'tbl-wrap'},[
        el('table',{},[
          el('thead',{},[el('tr',{},[el('th',{},'Ora'),el('th',{},'Durata'),el('th',{},'Materia'),el('th',{},'Docente (ora libero)'),el('th',{},'Sede')])]),
          tbody2
        ])
      ]),
      isAdmin?el('div',{style:{marginTop:'0.75rem'}},[el('button',{class:'btn btn-danger btn-sm',onclick:async()=>{if(!confirm('Eliminare questa uscita?'))return;const ok=await dbEliminaAssenza(a.id);if(ok){addToast('✅ Uscita eliminata');await caricaTutto();}}},'🗑 Elimina uscita')]):null
    ].filter(Boolean));
  }

  // ── ASSENZA DOCENTE ──
  const lezioni=lezioniPerAssenza(a);
  const tipo=a.tipo==='giorno';
  const thead=el('thead',{},[el('tr',{},[el('th',{},'Ora'),el('th',{},'Durata'),el('th',{},'Materia'),el('th',{},'Docente/i'),el('th',{},'Classe'),el('th',{},'Aula'),el('th',{},'Sede'),el('th',{style:{minWidth:'210px'}},'Sostituto assegnato')])]);
  const tbody=el('tbody',{});
  if(lezioni.length===0){tbody.appendChild(el('tr',{},[el('td',{colspan:'8',style:{color:'#aaa',fontSize:'0.83rem',padding:'0.75rem'}},'Nessuna lezione trovata nell\'orario per questo giorno')]));}
  else{
    lezioni.forEach((l,i)=>{
      const key=a.id+'_'+i;
      const sost=STATE.sostituzioni.find(s=>s.assenzaId===a.id&&s.lessonKey===key);
      const isDispRow=sost&&sost.isDisposizione;
      // Co-docenti presenti → lezione auto-coperta
      const coPresenti=coDocentiPresenti(l,a.date);
      const autoCoperta=l.doc_cogn.length>1&&coPresenti.length>0;
      let sostitutoCell;
      if(autoCoperta){
        sostitutoCell=el('div',{style:{display:'flex',flexDirection:'column',gap:'3px'}},[
          el('span',{style:{background:'#e0f7f4',border:'1px solid #99e6da',borderRadius:'6px',padding:'2px 8px',fontSize:'0.72rem',fontWeight:700,color:'#0f766e'}},'🤝 Coperta dal collega'),
          el('span',{style:{fontSize:'0.72rem',color:'#555'}},coPresenti.map(d=>'Prof. '+d).join(', '))
        ]);
      } else if(isAdmin){
        sostitutoCell=renderSelectSostituto(a,l,i,key,sost);
      } else {
        sostitutoCell=sost?frag(el('strong',{},sost.docCognSostituto),' ',sost.isDisposizione?el('span',{style:{background:'#dcfce7',border:'1px solid #86efac',borderRadius:'6px',padding:'2px 7px',fontSize:'0.72rem',fontWeight:700,color:'#15803d'}},'⭐ A disposizione'):el('span',{class:'pill pill-green'},'✓ Assegnato')):el('span',{class:'pill pill-gray'},'Non assegnato');
      }
      const tr=el('tr',{style:autoCoperta?{background:'#f0fdf8'}:isDispRow?{background:'#f0fdf4'}:{}},[
        el('td',{},[el('strong',{},l.oInizio)]),el('td',{},l.durata+'min'),
        el('td',{},isDisposizioneMateria(l.mat_nome)?el('span',{class:'pill pill-purple'},'Disposizione'):l.mat_nome),
        el('td',{},[...l.doc_cogn.map(d=>{
          const assente=STATE.assenze.some(ax=>ax.date===a.date&&ax.docCogn===d&&(ax.tipo==='giorno'||(ax.tipo==='ora'&&ax.ora===l.oInizio)));
          return el('span',{class:'docente-chip',style:assente?{background:'#fdecea',borderColor:'#f5a0a0',color:'#c0392b',textDecoration:'line-through'}:{}},d+(assente?' ✗':''));
        })]),
        el('td',{},l.classe||'—'),el('td',{},l.aula||'—'),
        el('td',{},[el('span',{class:'sede-'+(l.sede==='Betti'?'betti':'devincenti')},l.sede)]),
        el('td',{},sostitutoCell)
      ]);
      tbody.appendChild(tr);
    });
  }
  return el('div',{class:'card'},[el('div',{class:'card-title'},['👤 Prof. '+a.docCogn+(a.docNome?' '+a.docNome:'')+' ',el('span',{class:'pill '+(tipo?'pill-red':'pill-orange')},tipo?'Assente tutto il giorno':'Permesso ora '+a.ora)]),el('div',{class:'tbl-wrap'},[el('table',{},[thead,tbody])])]);
}

function renderBachecaSostituzioni(){
  const oggi=todayStr();
  const giornoCalc=getDayName(oggi);
  const assenzeOggi=STATE.assenze.filter(a=>a.date===oggi);
  const usciteOggi=assenzeOggi.filter(a=>a.tipo==='uscita');
  const assenzeDocenti=assenzeOggi.filter(a=>a.tipo!=='uscita');

  // Raccoglie tutte le righe di sostituzione per oggi
  const righe=[];
  assenzeDocenti.forEach(a=>{
    const lezioni=lezioniPerAssenza(a);
    lezioni.forEach((l,i)=>{
      const key=a.id+'_'+i;
      const sost=STATE.sostituzioni.find(s=>s.assenzaId===a.id&&s.lessonKey===key);
      righe.push({assenza:a,lezione:l,sost,key});
    });
  });

  // Ordina per ora
  righe.sort((a,b)=>(a.lezione.oInizio||'').localeCompare(b.lezione.oInizio||''));

  const tbody=el('tbody',{});
  if(righe.length===0){
    tbody.appendChild(el('tr',{},[el('td',{colspan:'7',style:{color:'#999',padding:'1.5rem',textAlign:'center',fontSize:'0.9rem'}},'✅ Nessuna sostituzione prevista per oggi')]));
  } else {
    righe.forEach(({assenza:a,lezione:l,sost})=>{
      const isDisp=sost&&sost.isDisposizione;
      const coPresenti=coDocentiPresenti(l,oggi);
      const autoCoperta=l.doc_cogn.length>1&&coPresenti.length>0;
      const tr=el('tr',{style:autoCoperta?{background:'#f0fdf8'}:isDisp?{background:'#f0fdf4'}:{}});
      tr.appendChild(el('td',{},[el('strong',{style:{fontSize:'0.92rem'}},l.oInizio)]));
      tr.appendChild(el('td',{},l.mat_nome||'—'));
      tr.appendChild(el('td',{},[...l.doc_cogn.map(d=>{
        const assente=STATE.assenze.some(ax=>ax.date===oggi&&ax.docCogn===d&&(ax.tipo==='giorno'||(ax.tipo==='ora'&&ax.ora===l.oInizio)));
        return el('span',{class:'docente-chip',style:assente?{background:'#fdecea',borderColor:'#f5a0a0',color:'#c0392b',textDecoration:'line-through'}:{}},d);
      })]));
      tr.appendChild(el('td',{},l.classe||'—'));
      tr.appendChild(el('td',{},l.aula||'—'));
      tr.appendChild(el('td',{},[el('span',{class:'sede-'+(l.sede==='Betti'?'betti':'devincenti')},l.sede)]));
      if(autoCoperta){
        tr.appendChild(el('td',{},[
          el('span',{style:{background:'#e0f7f4',border:'1px solid #99e6da',borderRadius:'6px',padding:'2px 8px',fontSize:'0.72rem',fontWeight:700,color:'#0f766e'}},'🤝 '+coPresenti.map(d=>'Prof. '+d).join(', '))
        ]));
      } else if(sost){
        tr.appendChild(el('td',{},[
          el('strong',{},sost.docCognSostituto),
          ' ',
          isDisp
            ? el('span',{style:{background:'#dcfce7',border:'1px solid #86efac',borderRadius:'6px',padding:'2px 7px',fontSize:'0.72rem',fontWeight:700,color:'#15803d'}},'⭐ Disposizione')
            : el('span',{class:'pill pill-green'},'✓')
        ]));
      } else {
        tr.appendChild(el('td',{},[el('span',{class:'pill pill-gray'},'Non assegnato')]));
      }
      tbody.appendChild(tr);
    });
  }

  // Aggiornamento automatico ogni 60 secondi (timer globale per evitare duplicati)
  if(window._bachecaTimer) clearTimeout(window._bachecaTimer);
  window._bachecaTimer=setTimeout(async()=>{await caricaTutto();},60000);

  const lastUpdate=el('span',{style:{fontSize:'0.78rem',color:'#888'}},'Aggiornato alle '+new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'}));
  const refreshBtn=el('button',{class:'btn btn-outline btn-sm'},['🔄 Aggiorna']);
  refreshBtn.addEventListener('click',async()=>{
    refreshBtn.disabled=true;
    refreshBtn.textContent='Caricamento…';
    await caricaTutto();
  });

  // Statistiche rapide
  const nAssegnate=righe.filter(r=>r.sost).length;
  const nTotali=righe.length;

  const statBar=el('div',{style:{display:'flex',gap:'12px',flexWrap:'wrap',marginBottom:'1rem'}}, [

function renderSelectSostituto(assenza,lezione,idx,key,sost){
  const disp=docentiDisponibili(lezione,STATE.selDate);
  const valCorrente=sost?sost.docCognSostituto:'';
  const wrap=el('div',{class:'dd-wrap'});
  function isDispVal(v){return v&&disp.disposizioni.includes(v);}
  function labelFor(v){if(!v)return'— Nessuno assegnato —';return isDispVal(v)?'⭐ '+v+' (a disposizione)':v;}
  const triggerLabel=el('span',{class:'dd-label'},labelFor(valCorrente));
  const trigger=el('button',{class:'dd-trigger'+(isDispVal(valCorrente)?' disp-sel':''),type:'button'},[triggerLabel,el('span',{class:'dd-arrow'},'▾')]);
  const menu=el('div',{class:'dd-menu'});
  const badge=el('div',{class:'dd-badge',style:{display:isDispVal(valCorrente)?'flex':'none'}},'⭐ A disposizione');
  trigger.addEventListener('click',function(e){e.stopPropagation();document.querySelectorAll('.dd-menu.open').forEach(m=>{if(m!==menu)m.classList.remove('open');});menu.classList.toggle('open');});
  function buildMenu(curVal){
    menu.innerHTML='';
    const noneOpt=el('div',{class:'dd-none'+(curVal===''?' selected':'')},'— Nessuno assegnato —');
    noneOpt.addEventListener('click',function(e){e.stopPropagation();applyVal('');});
    menu.appendChild(noneOpt);
    [{label:'⭐ A disposizione — priorità massima',docs:disp.disposizioni,isDisp:true},{label:'🟢 Stesso docente in classe',docs:disp.stesseClassi,isDisp:false},{label:'🟡 Stessa materia',docs:disp.stessaMat,isDisp:false},{label:'⚪ Altri disponibili',docs:disp.liberi,isDisp:false}].forEach(function(g){
      if(!g.docs||g.docs.length===0)return;
      menu.appendChild(el('div',{class:'dd-group-label'+(g.isDisp?' disp-lbl':'')},g.label));
      g.docs.forEach(function(d){
        const isSel=d===curVal;
        const item=el('div',{class:'dd-option'+(g.isDisp?' disp-opt':'')+(isSel?' selected':'')});
        if(g.isDisp)item.appendChild(document.createTextNode('⭐ '));
        item.appendChild(el('span',{},d));
        if(isSel)item.appendChild(el('span',{style:{marginLeft:'auto',fontSize:'0.72rem'}},'✓'));
        item.addEventListener('click',function(e){e.stopPropagation();applyVal(d);});
        menu.appendChild(item);
      });
    });
  }
  async function applyVal(val){
    menu.classList.remove('open');
    const isD=isDispVal(val);
    triggerLabel.textContent=labelFor(val);
    trigger.className='dd-trigger'+(isD?' disp-sel':'');
    badge.style.display=isD?'flex':'none';
    buildMenu(val);
    if(val){
      const ok=await dbSalvaSostituzione(assenza.id,key,val,isD);
      if(ok){
        const sostIdx=STATE.sostituzioni.findIndex(s=>s.assenzaId===assenza.id&&s.lessonKey===key);
        const nuovaSost={assenzaId:assenza.id,lessonKey:key,docCognSostituto:val,isDisposizione:isD};
        if(sostIdx>=0)STATE.sostituzioni[sostIdx]=nuovaSost;else STATE.sostituzioni.push(nuovaSost);
        await inviaEmailSostituzione(assenza,lezione,val);
        addToast((isD?'⭐ A disposizione assegnato':'✅ Sostituzione assegnata')+' — Prof. '+val);
      }
    } else {
      await dbRimuoviSostituzione(assenza.id,key);
      STATE.sostituzioni=STATE.sostituzioni.filter(s=>!(s.assenzaId===assenza.id&&s.lessonKey===key));
      addToast('ℹ️ Sostituzione rimossa');
    }
  }
  buildMenu(valCorrente);
  wrap.appendChild(trigger);wrap.appendChild(menu);wrap.appendChild(badge);
  return wrap;
}

            if(e.status!=null) rows.push(el('div',{style:{fontSize:'0.79rem',marginBottom:'4px'}},[
              el('span',{style:{color:'#888'}},'HTTP status: '),
              el('code',{style:{background:'#fdecea',color:'#c0392b',padding:'1px 5px',borderRadius:'4px',fontFamily:'monospace'}},String(e.status)),
            ]));
            // EmailJS text response
            if(e.text) rows.push(el('div',{style:{fontSize:'0.79rem',marginBottom:'4px'}},[
              el('span',{style:{color:'#888'}},'Risposta EmailJS: '),
              el('code',{style:{background:'#fdecea',color:'#c0392b',padding:'1px 5px',borderRadius:'4px',fontFamily:'monospace'}},e.text),
            ]));
            // JS error message
            if(e.message) rows.push(el('div',{style:{fontSize:'0.79rem',marginBottom:'4px'}},[
              el('span',{style:{color:'#888'}},'Messaggio: '),
              el('code',{style:{background:'#fdecea',color:'#c0392b',padding:'1px 5px',borderRadius:'4px',fontFamily:'monospace'}},e.message),
            ]));
            // Error name
            if(e.name&&e.name!=='Error') rows.push(el('div',{style:{fontSize:'0.79rem',marginBottom:'4px'}},[
              el('span',{style:{color:'#888'}},'Tipo errore: '),
              el('code',{style:{background:'#f3e8ff',color:'#6b21a8',padding:'1px 5px',borderRadius:'4px',fontFamily:'monospace'}},e.name),
            ]));

            // Causa probabile
            let causa='Causa sconosciuta';
            if(e.status===400||e.text?.toLowerCase().includes('template'))causa='❗ Template ID non trovato o parametri mancanti nel template EmailJS';
            else if(e.status===401||e.text?.toLowerCase().includes('api key')||e.text?.toLowerCase().includes('public key'))causa='❗ Public Key EmailJS non valida o non autorizzata';
            else if(e.status===403)causa='❗ Servizio EmailJS non autorizzato — verifica i domini consentiti nel pannello EmailJS';
            else if(e.status===404)causa='❗ Service ID non trovato su EmailJS';
            else if(e.status===412||e.text?.toLowerCase().includes('quota')||e.text?.toLowerCase().includes('limit'))causa='❗ Quota email EmailJS superata (piano gratuito: 200/mese)';
            else if(e.status===422)causa='❗ Parametri del template non corrispondono (to_email, message, subject…)';
            else if(e.text?.toLowerCase().includes('network')||e.message?.toLowerCase().includes('network')||e.message?.toLowerCase().includes('fetch'))causa='❗ Errore di rete — nessuna connessione o EmailJS irraggiungibile';
            else if(!e.status&&!e.text&&e.message)causa='❗ Errore JavaScript lato client (non EmailJS)';

            rows.push(el('div',{style:{background:'#fff3cd',border:'1px solid #f0c36d',borderRadius:'6px',padding:'6px 10px',fontSize:'0.79rem',color:'#7a4a00',marginTop:'6px'}},causa));

            // Toggle dettaglio grezzo
            const detailPre=el('pre',{style:{display:'none',background:'#1e1e1e',color:'#d4d4d4',borderRadius:'6px',padding:'10px',fontSize:'0.72rem',overflowX:'auto',marginTop:'6px',whiteSpace:'pre-wrap',wordBreak:'break-all',maxHeight:'200px',overflowY:'auto'}},e.raw||'—');
            const toggleBtn=el('button',{class:'btn btn-outline btn-sm',style:{marginTop:'6px',fontSize:'0.72rem'}},
              '🔍 Mostra oggetto errore grezzo');
            toggleBtn.addEventListener('click',()=>{
              const vis=detailPre.style.display==='none';
              detailPre.style.display=vis?'block':'none';
              toggleBtn.textContent=vis?'🔍 Nascondi':'🔍 Mostra oggetto errore grezzo';
            });
            rows.push(toggleBtn,detailPre);

            // Parametri inviati
            const paramsPre=el('pre',{style:{display:'none',background:'#f8f8f8',border:'1px solid #e0e0e0',borderRadius:'6px',padding:'10px',fontSize:'0.72rem',overflowX:'auto',marginTop:'6px',whiteSpace:'pre-wrap',wordBreak:'break-all',maxHeight:'180px',overflowY:'auto'}},e.params||'—');
            const paramsBtn=el('button',{class:'btn btn-outline btn-sm',style:{marginTop:'4px',fontSize:'0.72rem'}},'📄 Mostra parametri inviati a EmailJS');
            paramsBtn.addEventListener('click',()=>{
              const vis=paramsPre.style.display==='none';
              paramsPre.style.display=vis?'block':'none';
              paramsBtn.textContent=vis?'📄 Nascondi parametri':'📄 Mostra parametri inviati a EmailJS';
            });
            rows.push(paramsBtn,paramsPre);
          } else {
            if(e.status!=null) rows.push(el('div',{style:{fontSize:'0.79rem',color:'#1a7a4a'}},'HTTP status: '+e.status+(e.text?' — '+e.text:'')));
          }

          return el('div',{style:{background:isErr?'#fdecea':'#e8f5ee',border:'1px solid '+(isErr?'#f5a0a0':'#a8dcc0'),borderRadius:'8px',padding:'12px 14px',marginBottom:'10px'}},rows);
        });

    const clearBtn=el('button',{class:'btn btn-outline btn-sm',style:{marginLeft:'8px'},onclick:()=>{STATE.emailErrorLog=[];render();}},'🗑 Svuota log sessione');
    content=el('div',{class:'card'},[
      el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1rem'}},[
        el('div',{class:'card-title',style:{marginBottom:0}},errors.length+' eventi in questa sessione'),
        clearBtn,
      ]),
      el('div',{class:'section-note',style:{marginBottom:'1rem'}},'ℹ️ Questo log è in-memory: si azzera al ricaricamento della pagina. Gli errori vengono anche salvati nel DB (colonna stato).'),
      ...errRows,
    ]);

  } else {
    // ── DIAGNOSTICA ──
    const cfgRows=[
      ['Service ID',CFG.EMAILJS_SERVICE_ID||'(vuoto)','service_XXXXXXX'],
      ['Template ID',CFG.EMAILJS_TEMPLATE_ID||'(vuoto)','template_XXXXXXX'],
      ['Public Key',CFG.EMAILJS_PUBLIC_KEY?CFG.EMAILJS_PUBLIC_KEY.slice(0,8)+'…':'(vuota)','AbCdEfGh…'],
    ];
    const cfgTable=el('table',{style:{width:'100%',borderCollapse:'collapse',fontSize:'0.82rem'}},[
      el('thead',{},[el('tr',{},[el('th',{style:{textAlign:'left',padding:'6px 8px',background:'#f0f4fb',color:'#1a3a6e'}},'Parametro'),el('th',{style:{textAlign:'left',padding:'6px 8px',background:'#f0f4fb',color:'#1a3a6e'}},'Valore configurato'),el('th',{style:{textAlign:'left',padding:'6px 8px',background:'#f0f4fb',color:'#1a3a6e'}},'Formato atteso')])]),
      el('tbody',{},cfgRows.map(([k,v,fmt])=>el('tr',{},[
        el('td',{style:{padding:'6px 8px',borderBottom:'1px solid #f0f0f0',fontWeight:600}},k),
        el('td',{style:{padding:'6px 8px',borderBottom:'1px solid #f0f0f0',fontFamily:'monospace',color:v.startsWith('(')?'#c0392b':'#1a7a4a'}},v),
        el('td',{style:{padding:'6px 8px',borderBottom:'1px solid #f0f0f0',color:'#888',fontFamily:'monospace',fontSize:'0.75rem'}},fmt),
      ]))),
    ]);

    const testBtn=el('button',{class:'btn btn-primary btn-sm',style:{marginTop:'1rem'}},'🧪 Invia email di test a se stessi');
    const testLog=el('div',{style:{marginTop:'0.75rem'}});
    testBtn.addEventListener('click',async()=>{
      testBtn.disabled=true;
      testBtn.textContent='Invio in corso…';
      const myEmail=STATE.currentUser?.profilo?.email||STATE.currentUser?.email||'';
      if(!myEmail){testLog.innerHTML='<div class="err-msg">Email utente non trovata</div>';testBtn.disabled=false;testBtn.textContent='🧪 Invia email di test';return;}
      try{
        const resp=await emailjs.send(CFG.EMAILJS_SERVICE_ID,CFG.EMAILJS_TEMPLATE_ID,{
          to_email:myEmail,to_name:'Admin Test',
          subject:'[TEST] Verifica configurazione EmailJS',
          message:'Questo è un messaggio di test inviato dal pannello diagnostica EmailJS.\n\nSe stai leggendo questa email, la configurazione è corretta! ✅\n\nTimestamp: '+new Date().toISOString(),
        });
        testLog.innerHTML='';
        testLog.appendChild(el('div',{class:'notif notif-ok'},'✅ Test inviato con successo a '+myEmail+' (HTTP '+resp.status+': '+resp.text+')'));
        logEmailSuccess({tipo:'test',email:myEmail,oggetto:'[TEST] Verifica configurazione EmailJS',resp});
      }catch(e){
        testLog.innerHTML='';
        const entry=logEmailError({tipo:'test',email:myEmail,oggetto:'[TEST]',params:{to_email:myEmail},err:e});
        const errEl=el('div',{style:{background:'#fdecea',border:'1px solid #f5a0a0',borderRadius:'8px',padding:'12px'}},[
          el('div',{style:{fontWeight:700,color:'#c0392b',marginBottom:'6px'}},'❌ Invio fallito'),
          e.status?el('div',{style:{fontSize:'0.82rem',marginBottom:'4px'}},'HTTP '+e.status+(e.text?': '+e.text:'')):'',
          e.message?el('div',{style:{fontSize:'0.82rem',color:'#555',marginBottom:'4px'}},'Messaggio: '+e.message):'',
          el('div',{style:{fontSize:'0.8rem',color:'#7a4a00',background:'#fff3cd',borderRadius:'6px',padding:'6px 10px',marginTop:'6px'}},'💡 Vai al tab "Errori EmailJS" per il dettaglio completo e la causa probabile.'),
        ]);
        testLog.appendChild(errEl);
      }
      testBtn.disabled=false;
      testBtn.textContent='🧪 Invia email di test a se stessi';
    });

    const checkList=[
      ['EmailJS SDK caricato',typeof emailjs!=='undefined'?'✅ OK':'❌ NON caricato — controlla la connessione e il CDN'],
      ['Service ID presente',CFG.EMAILJS_SERVICE_ID?'✅ '+CFG.EMAILJS_SERVICE_ID:'❌ Vuoto — imposta CFG.EMAILJS_SERVICE_ID'],
      ['Template ID presente',CFG.EMAILJS_TEMPLATE_ID?'✅ '+CFG.EMAILJS_TEMPLATE_ID:'❌ Vuoto — imposta CFG.EMAILJS_TEMPLATE_ID'],
      ['Public Key presente',CFG.EMAILJS_PUBLIC_KEY?'✅ (nascosta per sicurezza)':'❌ Vuota — imposta CFG.EMAILJS_PUBLIC_KEY'],
      ['EmailJS inizializzato','✅ emailjs.init() chiamato all\'avvio'],
    ];
    const checkTable=el('div',{style:{marginBottom:'1rem'}},checkList.map(([label,val])=>{
      const ok=val.startsWith('✅');
      return el('div',{style:{display:'flex',gap:'10px',alignItems:'flex-start',padding:'5px 0',borderBottom:'1px solid #f5f5f5',fontSize:'0.83rem'}},[
        el('span',{style:{minWidth:'220px',color:'#444',fontWeight:500}},label),
        el('span',{style:{color:ok?'#1a7a4a':'#c0392b'}},val),
      ]);
    }));

    content=el('div',{class:'card'},[
      el('div',{class:'card-title'},'🔧 Diagnostica configurazione EmailJS'),
      el('div',{class:'section-note',style:{marginBottom:'1rem'}},'Verifica che i valori in CFG corrispondano esattamente a quelli nel pannello EmailJS (emailjs.com/account).'),
      checkTable,
      el('div',{class:'card-title',style:{marginTop:'1rem'}},'📋 Valori CFG attuali'),
      cfgTable,
      el('div',{class:'card-title',style:{marginTop:'1.5rem'}},'🧪 Test invio'),
      el('div',{style:{fontSize:'0.82rem',color:'#555',marginBottom:'0.5rem'}},'Invia una email di test al tuo indirizzo ('+( STATE.currentUser?.profilo?.email||STATE.currentUser?.email||'—')+') per verificare che tutto funzioni.'),
      testBtn,
      testLog,
      el('div',{class:'card-title',style:{marginTop:'1.5rem'}},'📚 Parametri template'),
      el('div',{style:{fontSize:'0.82rem',color:'#555',marginBottom:'0.5rem'}},'Il template EmailJS deve contenere le seguenti variabili:'),
      el('div',{style:{fontFamily:'monospace',background:'#f8f8f8',border:'1px solid #e0e0e0',borderRadius:'6px',padding:'10px',fontSize:'0.8rem',lineHeight:'1.8'}},
        ['{{to_email}}  — indirizzo destinatario','{{to_name}}   — nome destinatario','{{subject}}   — oggetto email','{{message}}   — corpo email'].join('\n')),
    ]);
  }

  return frag(
    el('div',{class:'page-title'},'📧 Log Notifiche Email'),
    el('div',{class:'section-note'},'Le email sono inviate via EmailJS. Usa i tab per esplorare il log, gli errori dettagliati e la diagnostica.'),
    tabBar,
    content
  );
}

// ================================================================
// MODAL
// ================================================================
function renderModal(){
  const m=STATE.modal;if(!m)return null;
  const bg=el('div',{class:'modal-bg'});
  const modal=el('div',{class:'modal'});
  modal.appendChild(el('div',{class:'modal-title'},[m.title,el('button',{class:'modal-close',onclick:()=>{STATE.modal=null;render();}},'✕')]));
  modal.appendChild(m.body);
  modal.appendChild(el('div',{class:'modal-actions'},m.actions.map(a=>{const b=el('button',{class:a.cls},a.label);b.addEventListener('click',a.cb);return b;})));
  bg.appendChild(modal);
  bg.addEventListener('click',e=>{if(e.target===bg){STATE.modal=null;render();}});
  return bg;
}

// ================================================================
// AVVIO
// ================================================================
initAuth();
</script>
